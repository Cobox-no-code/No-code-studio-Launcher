name: Release Launcher

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env.production for Vite
        shell: bash
        run: |
          echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}" > .env.production
          echo "VITE_APP_ENV=production" >> .env.production

      - name: Build and publish Electron installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_APP_ENV: production
          EP_DRAFT: false
          EP_PRE_RELEASE: true # auto-flip to false on stable v2.0.0+
